    <div id="imageModal" class="modal">
      <span class="close">&times;</span>
      <figure>
        <!-- Image content will be inserted here if it's an image -->
        <img class="modal-content" id="img01" style="display: none" />
        <!-- Video content will be inserted here if it's a video -->

    <script>
      // Initialize Masonry after all images have loaded
      document.addEventListener("DOMContentLoaded", (event) => {
        // Select all gallery elements
        const galleries = document.querySelectorAll(".gallery");

        // Iterate over each gallery and initialize Masonry
        galleries.forEach(function (grid) {
          imagesLoaded(grid, function () {
            new Masonry(grid, {
              itemSelector: ".gallery-item",
              columnWidth: 261,
              gutter: 3,
              fitWidth: true,
            });
          });
        });
      });
    </script>
    <script>
      // Get the modal
      const modal = document.getElementById("imageModal");

      // Get the image and insert it inside the modal
      const modalImg = document.getElementById("img01");
      const captionText = document.getElementById("caption");
      const closeBtn = document.getElementsByClassName("close")[0];

      // Loop through gallery items to add click event
      const galleryItems = document.getElementsByClassName("gallery-item");
      for (let i = 0; i < galleryItems.length; i++) {
        const imgOrVideo =
          galleryItems[i].getElementsByTagName("img")[0] ||
          galleryItems[i].getElementsByTagName("video")[0];
        imgOrVideo.onclick = function () {
          modal.style.display = "block";
          // Check if it's an image or a video and set the display and source accordingly
          if (this.tagName.toLowerCase() === "img") {
            modalImg.style.display = "block";
            modalImg.src = this.src;
            video01.style.display = "none";
          } else if (this.tagName.toLowerCase() === "video") {
            video01.style.display = "block";
            video01.src = this.src;
            modalImg.style.display = "none";
          }
          captionText.innerHTML = this.getAttribute("data-caption");
        };
      }

      // Close the modal
      closeBtn.onclick = function () {
        modal.style.display = "none";
      };
    </script>
